name: PowerGuard CI
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore Dependencies
        run: dotnet restore PowerGuard.sln
 
      - name: Build Solution
        run: dotnet build PowerGuard.sln --configuration Release --no-restore

      - name: Build Docker Image

        run:  docker build -t shahdayman315/powerguard-api:latest -t shahdayman315/powerguard-api:${{ github.run_number }} .
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
         username: ${{ secrets.DOCKER_USERNAME }}
         password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker Image
        run: docker push shahdayman315/powerguard-api:latest docker push shahdayman315/powerguard-api:${{ github.run_number }}
